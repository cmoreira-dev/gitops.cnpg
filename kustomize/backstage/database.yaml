apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: backstage
  namespace: cnpg-backstage
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  storage:
    size: 8Gi

  resources:
    requests:
      cpu: "150m"
      memory: "384Mi"
    limits:
      cpu: "150m"
      memory: "384Mi"

  bootstrap:
    initdb:
      database: backstagedb
      owner: backstageuser
      postInitSQL:
        - "ALTER ROLE backstageuser CREATEDB;"

  postgresql:
    parameters:
      max_connections: "30"
      shared_buffers: "64MB"
  
  monitoring:
    enablePodMonitor: true