---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/instance: pg-backstage
    app.kubernetes.io/managed-by: cloudnative-pg
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/version: '16'
    cnpg.io/cluster: pg-backstage
    release: prometheus
  name: pg-backstage
  namespace: backstage
spec:
  namespaceSelector: {}
  podMetricsEndpoints:
    - port: metrics
  selector:
    matchLabels:
      cnpg.io/cluster: pg-backstage
      cnpg.io/podRole: instance
